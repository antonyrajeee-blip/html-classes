<!DOCTYPE html>
<html>
    <head>

        <title>Bootstrap Carousel</title>
        
        <!-- Bootstrap CSS -->
        
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
        
        <!-- jQuery -->
        
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        
        <!-- Bootstrap JS -->
        
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
        
        <style>
        
        .carousel-inner img {
        
        width: 100%;
        
        height: 400px;
        
        margin: auto;
        
        }
        
        </style>
        
        </head>
        <body>
            <div class = "container">
                <h2>Carousel Example</h2>
                <div id = "myCarousel" class = "carousel slide" data-ride = "carousel">
            

                    <div class = "carousel-inner">
                        <div class = "item active">
                            <img src = "https://d1jyxxz9imt9yb.cloudfront.net/medialib/4350/image/s768x1300/AdobeStock_123823873_433578_reduced.jpg" alt = "Image">
                        </div>

                        <div class = "item">
                            <img src = "https://nationalzoo.si.edu/sites/default/files/styles/square_large/public/2025-01/20241030-817A8773-16RP.jpg?h=f6ccde7b&itok=m27pXZwZ" alt = "Image 2">
                        </div>

                        <div class = "item">
                            <img src = "https://i.ytimg.com/vi/3Fy668pn5ZQ/sddefault.jpg" alt = "Penguin">
                        </div>
                    </div>
                    <a class = "left carousel-control" href = "#myCarousel" data-slide = "prev">
                        <span class = "glyphicon glyphicon-chevron-left"></span>
                        <span class = "sr-only">Previous</span>
                    </a>
                    <a class = "right carousel-control" href = "#myCarousel" data-slide = "next">
                        <span class = "glyphicon glyphicon-chevron-right"></span>
                        <span class = "sr-only">Next</span>
                    </a>
                </div>
            </div>
        </body>
</html>
