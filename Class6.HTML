<!Doctype html>

<html>

<head>
    <title>Html forms</title>
</head>

<body>
    <h1>Personal details form</h1>
    <form>
        <fieldset>
            <legend>Personal Information</legend>
            <label>Name</label><br>
            <input type="text" id="name"><br><br>
            <label>Emali</label><br>
            <input type="email" id="emal"><br><br>
            <label>Contact Number (this will be hidden)</label><br>
            <input type="password" id="contact"><br><br>
            <label>Gender</label><br>
            <input type="radio" id="female" name="gender" value="female"> Female<br>
            <input type="radio" id="male" name="gender" value="male"> Male<br><br>
            <label>Favorite city</label><br>
            <input type="checkbox" id="city" value="New Delhi"> New Delhi<br>
            <input type="checkbox" id="city" value="Mumbai"> Mumbai<br><br>
            <label>Birthday</label>
            <input type="date" id="birthday" name="birthday"><br><br>
            <input type="submit">
        </fieldset>
    </form>
    <br><br><br>



    <fieldset>
        <legend><b>Enter your marks</b></legend>
        <form action = "/action_page.php"
            oninput = "x.value = (parseInt(m1.value) + parseInt(m2.value) + parseInt(m3.value)) / 3">
            <label>Name</label><br>
            <input type="text" id="name"><br><br>
            <label>Enter marks</label><br>
            <select name="Subject" id="subject">
                <option value = "Maths">Maths</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
            </select>

            <input type = "number" id = "m1" name = "m1"><br><br>
            <select name="Subject2" id="subject2">
                <option value = "Maths">Maths</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
            </select>


            <input type = "number" id = "m2" name = "m2"><br><br>
            <select name="Subject3" id="subject3">
                <option value = "Maths">Maths</option>
                <option value="Science">Science</option>
                <option value="English">English</option>
            </select>
            <input type = "number" id = "m3" name = "m3"><br><br>
            Average: <output name = "x" for = "m1 m2 m3"></output>
        </form>

    </fieldset>

</body>

</html>
