<!DOCTYPE html>

<html>
    <head>

    </head>
    <body>
        <h2>JavaScript string methods</h2>
        <p>Basic methods</p>
        <script>
            var str = "Amazing"
            document.write(str.toUpperCase());
            document.write("<br>");
            document.write(str.toLowerCase());
            document.write("<br>");
            document.write(str.startsWith('b'));
            document.write("<br>")

            var str1 = "I learnt about Methods";
            var patt = new RegExp("about");
            var res = patt .test(str1)
            document.write(res)
        </script>
        <hr>
        <h2>JavaScript for lopp</h2>
        <p id = "demo"></p>
        <script>
            var fruits = ["Apple", "Mango", "Grapes", "Watermelon", 
            "Jack fruit", "Banana"];
            var text = "";
            var i;
            for (i = 0; i < fruits.length; i++) {
                text += fruits[i] + "<br>";
            }
            document.getElementById("demo").innerHTML = text;
        </script>
        <hr>
        <h1>Switches in js</h1>
        <p id = "demo1"></p>
        <script>
            var day;
            switch (new Date().getDay()) {
                case 0:
                    day = "Sunday";
                break    
                case 1:
                    day = "Monday";
                break
                case 2:
                    day = "Tuesday"
                break
                case 3:
                    day = "Wednesday"
                break
                case 4:
                    day = "Thursday"
                break 
                case 5:
                    day = "Friday" 
                break
                case 6:
                    day = "Saturday"                  
            }
            document.getElementById("demo1").innerHTML = "Today is" + day; 
        </script>
    </body>
</html>
