<!doctype html>
<html lang="en">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  </head>
  <body>
    <div class = "jumbotron text-center">
        <h1>Jumbotron</h1>

    </div>

    <br><br>
    <div class = "container">
        <h1>Buttons</h1>

        <button type = "button" class = "btn btn-primary"><a href = "https://www.codingal.com/en-ca/student/dashboard/modules/">Primary</a></button>
        <button type = "button" class = "btn btn-secondary"><a href = "https://www.codingal.com/en-ca/student/dashboard/modules/">Secondary</a></button>
        <button type = "button" class = "btn btn-success">Success</button>
        <button type = "button" class = "btn btn-danger">Danger</button>
        <button type = "button" class = "btn btn-warning">Warning</button>

        <br><br>
        <h1>Badges</h1>
        <button type = "button" class = "btn btn-danger">
            messages
            <span class = "badge badge-primary">1</span>
        </button>
        <br>
        <button type = "button" class = "btn btn-secondary">
            calls
            <span class = "badge badge-warning">2</span>
        </button>
        <br>
        <button type = "button" class = "btn btn-primary">
            E-mails
            <span class = "badge badge-success">3</span>
        </button>
        <br>
        <button type = "button" class = "btn btn-success">
            Events
            <span class = "badge badge-secondary">4</span>
        </button>
        <br>
        <button type = "button" class = "btn btn-warning">
            Notifications
            <span class = "badge badge-danger">5</span>
        </button>

        <br><br>
        <div class = "container">
            <h2>Basic progress bar</h2>
            <p>to create a default
                 progress bar, addd a .progress class to a container element
                  and add the progress-bar class to its child element.
                 use the css width property to set the width of the progress bar</p>
            <div class = "progress">
                <div class = "progress-bar" style = "width:70%">70%</div>
            </div>     
        </div>
        <br><br>
        


    </div>
  </body>
</html>
